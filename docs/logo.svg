<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="KodHekim">
  <title>KodHekim</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>

  <!-- Code brackets, monospace stylized -->
  <text x="20" y="78" font-family="JetBrains Mono, Menlo, Consolas, monospace"
        font-size="42" font-weight="700" fill="#e0f2fe" opacity="0.55">&lt;/&gt;</text>

  <!-- Medical cross overlay -->
  <g transform="translate(72 36)">
    <rect x="16" y="0" width="16" height="56" rx="4" fill="url(#cross)"/>
    <rect x="0" y="20" width="48" height="16" rx="4" fill="url(#cross)"/>
  </g>

  <!-- Heartbeat pulse line -->
  <path d="M 14 100 L 36 100 L 44 88 L 56 110 L 68 92 L 80 104 L 90 100 L 114 100"
        fill="none" stroke="#a7f3d0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
</svg>
